<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maya</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; }

    body{
      font-family: Arial, sans-serif;
      background-image: url("margaridas.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 18px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .card{
      width: min(420px, 100%);
      background: rgba(255,255,255,0.88);
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      padding: 22px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 22px;
      min-height: calc(100vh - 36px);
      justify-content: space-between;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }

    .title{
      margin: 0;
      font-size: 22px;
      color: #3d6f4c;
      font-weight: 400;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      flex: 1;
      line-height: 1.35;
    }

    .back{
      border: none;
      background: rgba(0,0,0,0.06);
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      flex: 0 0 auto;
    }

    .ghost{
      width: 76px;
      flex: 0 0 auto;
    }

    .centerArea{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap: 18px;
      flex: 1;
    }

    .content{
      width: 100%;
      display:flex;
      flex-direction:column;
      gap: 18px;
      align-items:center;
    }

    .menuBtn{
      width: 100%;
      border:none;
      cursor:pointer;
      padding: 20px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      font-size: 16px;
      color:#2e3a46;
      text-align:center;
    }

    .rules{
      border-radius: 16px;
      background: rgba(255,255,255,0.70);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      padding: 14px;
      color:#3a3a3a;
      line-height: 1.55;
      text-align: center;
    }

    .rulesTitle{
      font-size: 14px;
      color:#3d6f4c;
      text-align:center;
      margin-bottom: 8px;
      font-family: 'Poppins', sans-serif;
    }

    .rulesMain{
      font-size: 13px;
    }

    .rulesSmall{
      font-size: 11px;
      margin-top: 8px;
    }

    .hint{
      font-size: 12px;
      color: rgba(0,0,0,0.55);
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="topbar">
      <button class="back" onclick="location.href='index.html'">← Voltar</button>
      <h1 class="title">🌼 Filhotinha Maya</h1>
      <div class="ghost"></div>
    </div>

    <div class="centerArea">
      <div class="content">
        <button class="menuBtn" onclick="location.href='maya-rotina.html'">🌼 Rotina da Maya</button>
        <button class="menuBtn" onclick="location.href='maya-pontuacao.html'">💰 Minha Pontuação / Premiação</button>
      </div>
    </div>

    <div>
      <div class="rules">
        <div class="rulesTitle">Regras</div>
        <div class="rulesMain">Telas e Eletrônico somente nos períodos:</div>
        <div class="rulesMain"><strong>Manhã:</strong> 09h às 11h</div>
        <div class="rulesMain"><strong>Noite:</strong> 18:30h às 20:30h</div>
        <div class="rulesSmall">Caso as regras sejam quebradas, você perde <strong>50% das moedas conquistadas no dia</strong>.</div>
      </div>
      <div class="hint" style="margin-top:10px;">As moedas podem aumentar ou diminuir conforme o desempenho 🌼</div>
    </div>
  </div>
</body>
</html>
